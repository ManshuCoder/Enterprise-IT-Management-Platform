services:
  # EIMP Backend API Server
  - type: web
    name: eimp-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # Provide your Atlas connection string in Render Dashboard UI
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false # Set this to your Vercel deployment URL e.g. https://your-app.vercel.app
